<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SectionMiner Viewer</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <h1>SectionMiner Viewer</h1>
      <p>Envie um PDF para extrair secoes e visualizar onde cada trecho aparece no documento.</p>
    </header>

    <main class="layout">
      <section class="panel panel-left">
        <form id="upload-form">
          <input type="file" id="pdf-input" accept="application/pdf" required />
          <button type="submit" id="send-btn">Extrair secoes</button>
        </form>
        <p id="status"></p>

        <section class="info-panel" aria-live="polite">
          <div class="info-header">
            <h2>Informacoes da extracao</h2>
            <span id="backend-badge" class="backend-badge">-</span>
          </div>
          <div class="metrics-grid">
            <article class="metric-card">
              <span class="metric-label">Paginas</span>
              <strong id="metric-pages">-</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">Secoes</span>
              <strong id="metric-sections">-</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">Tokens usados</span>
              <strong id="metric-tokens">-</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">Custo total (USD)</span>
              <strong id="metric-cost">-</strong>
            </article>
          </div>
        </section>

        <div class="pdf-controls">
          <button id="prev-page" type="button">Pagina anterior</button>
          <span id="page-info">Pagina 0 / 0</span>
          <button id="next-page" type="button">Proxima pagina</button>
        </div>

        <div id="pdf-container">
          <canvas id="pdf-canvas"></canvas>
          <div id="pdf-overlay"></div>
        </div>
      </section>

      <section class="panel panel-right">
        <h2>Secoes extraidas</h2>
        <div id="sections"></div>
      </section>
    </main>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
